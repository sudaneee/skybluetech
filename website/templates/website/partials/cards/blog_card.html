{% load website_extras %}
<div class="blog-card reveal">
    <div class="blog-image">
        {% if post.featured_image %}
        <img src="{{ post.featured_image.url }}" alt="{{ post.title }}" loading="lazy">
        {% else %}
        <div class="w-100 h-100 d-flex align-items-center justify-content-center text-white">
            <i class="bi bi-journal-text fs-1"></i>
        </div>
        {% endif %}
    </div>
    <div class="blog-body">
        {% if post.category %}
        <span class="category">{{ post.category.name }}</span>
        {% endif %}
        <h4><a href="{{ post.get_absolute_url }}">{{ post.title }}</a></h4>
        <p class="text-muted">{{ post.excerpt|default:post.content|striptags|truncatewords:15 }}</p>
        <div class="meta d-flex justify-content-between align-items-center">
            <span><i class="bi bi-person me-1"></i> {{ post.author }}</span>
            <span><i class="bi bi-eye me-1"></i> {{ post.views }}</span>
        </div>
    </div>
</div>
